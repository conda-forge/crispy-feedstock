{% set name = "crispy" %}
{% set version = "0.7.4" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 0978aaff092d666df605e8208402c6f559c78aba72702d720585ac737247a393

build:
  number: 1
  script: '{{ PYTHON }} -m pip install . --no-deps --ignore-installed -vv '
  noarch: python
  entry_points:
    - crispy = crispy.__main__:main

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - h5py
    - matplotlib-base
    - numpy
    - python >={{ python_min }}
    - silx-base

test:
  requires:
    - python {{ python_min }}
  imports:
    - crispy
    - crispy.gui
    - crispy.gui.icons
    - crispy.gui.uis
    - crispy.modules
    - crispy.modules.orca
    - crispy.modules.quanty
    - crispy.utils

about:
  home: https://github.com/mretegan/crispy
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt
  summary: Core-Level Spectroscopy Simulations in Python
  doc_url: http://www.esrf.eu/computing/scientific/crispy/
  dev_url: http://www.esrf.eu/computing/scientific/crispy/

extra:
  recipe-maintainers:
    - tschoonj
